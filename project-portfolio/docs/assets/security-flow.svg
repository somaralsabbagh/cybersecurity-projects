<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Security Flow Diagram</title>
  <desc id="desc">Endpoint admission, policy enforcement, service proof, and runtime controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecf8ff"/>
      <stop offset="100%" stop-color="#fff7e7"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0b7285"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </linearGradient>
    <style>
      .box { fill: #ffffff; stroke: #0d2438; stroke-opacity: 0.2; stroke-width: 2; rx: 18; }
      .h1 { font: 700 34px 'Segoe UI', sans-serif; fill: #0d2438; }
      .h2 { font: 700 22px 'Segoe UI', sans-serif; fill: #075366; }
      .p { font: 500 17px 'Segoe UI', sans-serif; fill: #38546e; }
      .tag { font: 700 13px 'Segoe UI', sans-serif; letter-spacing: 0.08em; fill: #0b7285; }
      .arrow { stroke: url(#edge); stroke-width: 6; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="70" y="70" class="h1">Hybrid AAA Security Flow</text>
  <text x="70" y="102" class="p">From endpoint admission to runtime containment in SDN campus networks.</text>

  <rect x="70" y="160" width="210" height="150" class="box"/>
  <text x="98" y="196" class="tag">STEP 01</text>
  <text x="98" y="236" class="h2">Endpoint Bind</text>
  <text x="98" y="270" class="p">MAC/IP discovery</text>
  <text x="98" y="296" class="p">Edge context state</text>

  <rect x="330" y="160" width="210" height="150" class="box"/>
  <text x="358" y="196" class="tag">STEP 02</text>
  <text x="358" y="236" class="h2">RADIUS NAC</text>
  <text x="358" y="270" class="p">Admission decision</text>
  <text x="358" y="296" class="p">Identity attributes</text>

  <rect x="590" y="160" width="210" height="150" class="box"/>
  <text x="618" y="196" class="tag">STEP 03</text>
  <text x="618" y="236" class="h2">Policy Engine</text>
  <text x="618" y="270" class="p">Role-aware rules</text>
  <text x="618" y="296" class="p">Flow enforcement</text>

  <rect x="850" y="160" width="280" height="150" class="box"/>
  <text x="878" y="196" class="tag">STEP 04</text>
  <text x="878" y="236" class="h2">Kerberos Proof</text>
  <text x="878" y="270" class="p">Service step-up auth</text>
  <text x="878" y="296" class="p">Ticket validation</text>

  <path class="arrow" d="M280 235 H320"/>
  <path class="arrow" d="M540 235 H580"/>
  <path class="arrow" d="M800 235 H840"/>

  <rect x="70" y="390" width="1060" height="200" class="box"/>
  <text x="98" y="432" class="tag">STEP 05</text>
  <text x="98" y="468" class="h2">Runtime Security Controls</text>
  <text x="98" y="504" class="p">Session TTL, rate limits, lockdown, audit stream, and dashboard visibility.</text>

  <rect x="98" y="528" width="210" height="38" rx="10" fill="#e8f6f8" stroke="#0b7285" stroke-opacity="0.24"/>
  <text x="122" y="553" class="tag">SESSION MANAGER</text>

  <rect x="332" y="528" width="210" height="38" rx="10" fill="#e8f6f8" stroke="#0b7285" stroke-opacity="0.24"/>
  <text x="360" y="553" class="tag">RATE LIMITER</text>

  <rect x="566" y="528" width="210" height="38" rx="10" fill="#fff1d2" stroke="#f59f00" stroke-opacity="0.34"/>
  <text x="598" y="553" class="tag">LOCKDOWN CONTROL</text>

  <rect x="800" y="528" width="300" height="38" rx="10" fill="#eaf0ff" stroke="#3866c5" stroke-opacity="0.28"/>
  <text x="832" y="553" class="tag">DASHBOARD + API OBSERVABILITY</text>
</svg>
